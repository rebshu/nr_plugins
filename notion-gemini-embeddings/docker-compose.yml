version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: notion_embeddings
      POSTGRES_PASSWORD: notion_embeddings
      POSTGRES_DB: notion_embeddings
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notion_embeddings -d notion_embeddings"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      PG_DSN: postgresql://notion_embeddings:notion_embeddings@db:5432/notion_embeddings
      GCP_REGION: us-central1
      EMBEDDING_MODEL: gemini-embedding-2-preview
      EMBEDDING_REQUESTS_PER_MINUTE: 60
    ports:
      - "8000:8000"
